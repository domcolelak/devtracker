user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout  65;

    # BASIC RATE LIMITING - 10 REQUESTS PER SECOND PER CLIENT IP, WITH SOME BURST ROOM
    limit_req_zone $binary_remote_addr zone=devtracker_general:10m rate=10r/s;

    # FOR WEBSOCKET UPGRADES: SET Connection ONLY WHEN THE CLIENT ACTUALLY ASKS TO
    # UPGRADE. HARDCODING "upgrade" FOR EVERY REQUEST WOULD BREAK KEEPALIVE FOR
    # ORDINARY REST CALLS GOING THROUGH THE SAME location BLOCK.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    upstream core_django {
        server core-django:8000;
    }

    upstream api_fastapi {
        server api-fastapi:8001;
    }

    upstream reports_flask {
        server reports-flask:5000;
    }

    server {
        listen 80;
        server_name localhost;

        limit_req zone=devtracker_general burst=20 nodelay;

        client_max_body_size 10m;

        # DJANGO ADMIN AND AUTH ENDPOINTS
        location /admin/ {
            proxy_pass http://core_django/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # DJANGO STATIC FILES (ADMIN CSS/JS, SERVED BY WHITENOISE INSIDE THE CONTAINER)
        location /static/ {
            proxy_pass http://core_django/static/;
            proxy_set_header Host $host;
        }

        location /auth/ {
            proxy_pass http://core_django/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # PUBLIC REST API. THE /api PREFIX IS STRIPPED, SO /api/tasks MAPS TO /tasks
        # ON THE FASTAPI SIDE.
        location /api/ {
            proxy_pass http://api_fastapi/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WEBSOCKET SUPPORT FOR /api/ws/notifications. HARMLESS FOR PLAIN REST
            # CALLS THANKS TO THE $connection_upgrade MAP ABOVE.
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # KEEP IDLE WEBSOCKET CONNECTIONS ALIVE LONGER THAN THE 60s DEFAULT SO
            # NOTIFICATION SUBSCRIBERS ARE NOT DISCONNECTED BETWEEN EVENTS.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # PDF/CSV REPORT GENERATION. THE /reports PREFIX IS STRIPPED, SO
        # /reports/productivity.pdf MAPS TO /productivity.pdf ON THE FLASK SIDE.
        location /reports/ {
            proxy_pass http://reports_flask/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # PDF GENERATION FOR LARGE TEAMS CAN LEGITIMATELY TAKE A WHILE
            proxy_read_timeout 120s;
        }

        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
