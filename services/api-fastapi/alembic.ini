[alembic]
script_location = migrations
prepend_sys_path = .

# sqlalchemy.url IS SET AT RUNTIME BY migrations/env.py FROM THE DATABASE_URL
# ENVIRONMENT VARIABLE INSTEAD OF BEING HARDCODED HERE.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
